[package]
name = "reduction"
version = "0.0.1"
edition = "2024"
description = "Opinionated Rust Reverse Proxy"
license = "MIT"

[dependencies]
arc-swap = "1.9.1"
axum = "0.8.9"
bitcode = "0.6.9"
http = "1.4.0"
quinn = "0.11.9"
rustls = "0.23.40"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["rt-multi-thread", "net", "io-util", "macros", "signal", "fs", "sync"] }
tokio-rustls = "0.26.4"
toml = "1.1.2"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
url = "2.5.8"
zstd = "0.13.3"

[dev-dependencies]
tempfile = "3.27.0"
