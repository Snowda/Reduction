[listen]
address = "0.0.0.0:8443"
transport = "quic"

[tls.server]
cert_path = "certs/server.crt"
key_path = "certs/server.key"
ca_cert_path = "certs/ca.crt"

[tls.client]
cert_path = "certs/client.crt"
key_path = "certs/client.key"
ca_cert_path = "certs/ca.crt"

# Global timeout defaults (all values in seconds, all optional)
[timeouts]
connect_secs = 5
handshake_secs = 5
request_secs = 30

# Proxy tuning (all optional, shown with defaults)
[proxy]
max_response_body_bytes = 10485760   # 10 MB
h2_connections_per_backend = 4
max_idle_quic_per_host = 16
h2_stream_window = 2097152           # 2 MB — HTTP/2 per-stream flow control window
h2_conn_window = 4194304             # 4 MB — HTTP/2 per-connection flow control window
inline_compress_threshold = 8192     # bodies <= this size are decompressed inline; larger ones use a blocking task
quic_channel_capacity = 256          # bounded channel size for QUIC stream accept queue

# Compression settings (all optional, shown with defaults)
[compression]
level = 3                            # zstd level (1-22)
min_bytes = 256                      # skip compression below this size

# Load balancer settings (all optional, shown with defaults)
[balancer]
queue_depth = 1000                   # max queued requests per backend
jitter_factor = 0.05                 # weight jitter 0.0–1.0
drain_timeout_secs = 30              # time to drain connections on backend removal
max_backends = 64                    # max backends per pool (hard limit: 256)

# Circuit breaker (all optional, shown with defaults)
[circuit_breaker]
failure_threshold = 5                # consecutive failures before opening
recovery_timeout_secs = 60           # how long circuit stays open before probing
half_open_max_requests = 2           # probe requests allowed in half-open state

# Rate limiting (optional)
[ratelimit]
# requests_per_second = 10000       # per-IP rate limit (default: unlimited)

# Access control (optional)
[access]
# allow = ["10.0.0.0/8", "192.168.0.0/16"]  # if non-empty, only these CIDRs are permitted
# deny = ["0.0.0.0/0"]                       # explicitly blocked CIDRs

# Retry policy (all optional, shown with defaults)
[retry]
max_retries = 2                      # max retry attempts after initial failure
base_delay_ms = 200                  # initial backoff delay
max_delay_ms = 2000                  # backoff cap
jitter_ms = 100                      # random jitter added to each delay

# Response cache (all optional, shown with defaults)
# Caches GET/HEAD responses keyed on method + path. Respects Cache-Control
# directives: no-store and private skip caching, max-age sets TTL.
[cache]
# enabled = false                     # opt-in; no caching by default
# max_entries = 1000                  # LRU capacity
# max_entry_bytes = 1048576           # 1 MB — reject entries larger than this
# default_ttl_secs = 60              # fallback TTL when response has no max-age

# Health monitoring (all optional, shown with defaults)
[health]
staleness_ttl_secs = 300             # health data older than this is ignored

# Distributed tracing (optional)
[tracing]
# otlp_endpoint = "http://localhost:4318"  # OTLP HTTP endpoint for trace export
# sample_ratio = 1.0                       # 1.0 = sample all, 0.1 = 10%

[[backends]]
id = "api-primary"
host = "api.internal"
address = "10.0.0.1:8080"
weight = 3.0
transport = "quic"
max_connections = 100              # optional, defaults to 256

[[backends]]
id = "api-secondary"
host = "api.internal"
address = "10.0.0.2:8080"
weight = 1.0
transport = "quic"

[[routes]]
path_prefix = "/api/slow-report"
backend_id = "api-primary"
timeout_secs = 120               # override global request_secs for this route

[[routes]]
path_prefix = "/api"
backend_id = "api-primary"

[[routes]]
path_prefix = "/"
backend_id = "api-secondary"
