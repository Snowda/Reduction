[listen]
address = "0.0.0.0:8443"
transport = "quic"

[tls]
cert_path = "certs/server.crt"
key_path = "certs/server.key"
ca_cert_path = "certs/ca.crt"

# Global timeout defaults (all values in seconds, all optional)
[timeouts]
connect_secs = 5
handshake_secs = 5
request_secs = 30

# Proxy tuning (all optional, shown with defaults)
[proxy]
max_response_body_bytes = 10485760   # 10 MB
h2_connections_per_backend = 4
max_idle_quic_per_host = 16

# Compression settings (all optional, shown with defaults)
[compression]
level = 3                            # zstd level (1-22)
min_bytes = 256                      # skip compression below this size

# Load balancer settings (all optional, shown with defaults)
[balancer]
max_backends = 64                    # max backends per pool (hard limit: 256)

# Retry policy (all optional, shown with defaults)
[retry]
max_retries = 2                      # max retry attempts after initial failure
base_delay_ms = 200                  # initial backoff delay
max_delay_ms = 2000                  # backoff cap
jitter_ms = 100                      # random jitter added to each delay

# Health monitoring (all optional, shown with defaults)
[health]
staleness_ttl_secs = 300             # health data older than this is ignored

# Distributed tracing (optional)
[tracing]
# otlp_endpoint = "http://localhost:4318"  # OTLP HTTP endpoint for trace export
# sample_ratio = 1.0                       # 1.0 = sample all, 0.1 = 10%

[[backends]]
id = "api-primary"
host = "api.internal"
address = "10.0.0.1:8080"
weight = 3.0
transport = "quic"
max_connections = 100              # optional, defaults to 256

[[backends]]
id = "api-secondary"
host = "api.internal"
address = "10.0.0.2:8080"
weight = 1.0
transport = "quic"

[[routes]]
path_prefix = "/api/slow-report"
backend_id = "api-primary"
timeout_secs = 120               # override global request_secs for this route

[[routes]]
path_prefix = "/api"
backend_id = "api-primary"

[[routes]]
path_prefix = "/"
backend_id = "api-secondary"
